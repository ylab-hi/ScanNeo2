name: link-check

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - README.md
      - .github/workflows/links.yml
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - README.md
      - .github/workflows/links.yml
  schedule:
    # Monday 00:00 UTC — catches external link-rot without spamming the
    # actions log; the PR-time check still catches links broken at edit time.
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: Check links with lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-
      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --accept 200,206,429
            'docs/**/*.md'
            README.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
