usage:
  mandatory-flags:
    desc: |
      ScanNeo2 is configured via `config/config.yaml` (see `config/README.md`
      for the full parameter reference). At minimum, populate the `data:`
      section with paths to your input FASTQ/BAM files; the rest of the
      defaults are suitable for most use cases.
    flags:
      - --software-deployment-method conda
  software-stack-deployment:
    conda: true
    apptainer: false
    apptainer+conda: false
    report: false
